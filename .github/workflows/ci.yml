name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Python dependencies
        run: uv sync --locked

      - name: Install frontend dependencies
        run: npm ci --prefix web

      - name: Test backend
        run: uv run pytest

      - name: Test frontend
        run: npm test --prefix web -- --run

      - name: Lint frontend
        run: npm run lint --prefix web

      - name: Build frontend
        run: npm run build --prefix web

      - name: Build Python distributions
        run: uv build

      - name: Smoke-test wheel entry point
        run: uv tool run --no-cache --isolated --from dist/delta_review-0.1.0-py3-none-any.whl delta-review --help

      - name: Smoke-test wheel application
        run: uv run --no-project --isolated --with dist/delta_review-0.1.0-py3-none-any.whl python scripts/smoke_wheel.py

      - name: Upload distributions
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/

  python-compatibility:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - run: uv sync --locked
      - run: uv run pytest

  browser-performance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci --prefix web
      - run: npx --prefix web playwright install --with-deps chromium
      - run: npm run benchmark:browser --prefix web

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, python-compatibility, browser-performance]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/delta-review
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: distributions
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
